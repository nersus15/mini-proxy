[build]
cmd = "go build -o /tmp/main /app/webcore/main.go"
entrypoint = ["/tmp/main", "gateway"]
exclude = ["libraries/pubsub/*", "libraries/redis/*", "libraries/kafka/*", "libraries/db/*", "modules/stream/*", "modules/consent/*"]

[log]
# Show log time
time = false
# Only show main log (silences watcher, build, runner)
main_only = false
# silence all logs produced by air 
silent = false

[color]
# Customize each part's color. If no color found, use the raw app log.
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"